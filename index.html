<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="/" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="UW creator" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>UW creator</title>
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <style>
      :root {
        --loader-bg: #0b1115;
        --loader-bg-2: #111a20;
        --loader-primary: #3ddc97;
        --loader-text: #d7f6e8;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: radial-gradient(
          circle at top,
          var(--loader-bg-2) 0%,
          var(--loader-bg) 72%
        );
        z-index: 9999;
        transition:
          opacity 260ms ease,
          visibility 260ms ease;
      }

      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-ring {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 4px solid rgba(61, 220, 151, 0.22);
        border-top-color: var(--loader-primary);
        animation: spin 0.85s linear infinite;
      }

      .loader-text {
        color: var(--loader-text);
        font-family: Arial, sans-serif;
        font-size: 15px;
        letter-spacing: 0.2px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <div id="app-loader" aria-live="polite" role="status">
      <div class="loader-ring" aria-hidden="true"></div>
      <div class="loader-text">Loading app...</div>
    </div>

    <script>
      window.addEventListener("flutter-first-frame", function () {
        const loader = document.getElementById("app-loader");
        if (!loader) return;
        loader.classList.add("hidden");
        setTimeout(function () {
          loader.remove();
        }, 500);
      });
    </script>

    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
